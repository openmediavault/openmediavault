name: Continues Integration

on:
  push:
    branches:
      - 'master'
  pull_request:
    branches:
      - 'master'

env:
  NODE_VERSION: 16
  NODE_OPTIONS: --max_old_space_size=4096

permissions:
  contents: read

jobs:
  lint-ui:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@3235b876344d2a9aa001b8d1453c930bba69e610 # v3
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: deb/openmediavault/workbench/package-lock.json

      - name: Install dependencies
        working-directory: deb/openmediavault/workbench/
        run: npm ci

      - name: Run lint
        working-directory: deb/openmediavault/workbench/
        run: npm run lint

  lint-python:
    runs-on: ubuntu-latest
    container: python:3.13-slim

    steps:
      - name: Checkout code
        uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3

      - name: Install dependencies
        run: pip install --no-cache-dir autopep8

      - name: Run autopep8 check
        run: autopep8 --max-line-length 79 --diff --exit-code --recursive .

  lint-php:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3

      - name: Run php-cs-fixer
        uses: docker://ghcr.io/php-cs-fixer/php-cs-fixer:3.95.2-php8.4
        with:
          args: fix --config=deb/.php-cs-fixer.dist.php --allow-risky=yes --using-cache=no --dry-run --verbose

  test-ui:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@3235b876344d2a9aa001b8d1453c930bba69e610 # v3
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: deb/openmediavault/workbench/package-lock.json

      - name: Install dependencies
        working-directory: deb/openmediavault/workbench/
        run: npm ci

      - name: Run unit tests
        working-directory: deb/openmediavault/workbench/
        run: npm run test:ci

  test-shell:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3

      - name: Install dependencies
        working-directory: deb/openmediavault/usr/share/openmediavault/unittests/shell
        run: make install

      - name: Run unit tests
        working-directory: deb/openmediavault/usr/share/openmediavault/unittests/shell
        run: make test
