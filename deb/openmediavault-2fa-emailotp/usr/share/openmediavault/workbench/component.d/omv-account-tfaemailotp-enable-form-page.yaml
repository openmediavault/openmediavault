version: "1.0"
type: component
data:
  name: omv-account-tfaemailotp-enable-form-page
  type: formPage
  config:
    request:
      service: TFAEmailOtp
      get:
        method: sendOtpByContext
      post:
        method: enableByContext
    fields:
      - type: hint
        hintType: info
        text: _("A verification code has been sent to your email address. Please enter the code to confirm and enable two-factor authentication.")
      - type: hidden
        name: otpHash
      - type: hidden
        name: expiresAt
      - type: textInput
        name: code
        label: _("Verification code")
        value: ""
        autofocus: true
        autocomplete: "one-time-code"
        validators:
          required: true
          minLength: 6
          maxLength: 6
          pattern:
            pattern: '^[0-9]{6}$'
            errorData: _('Must be a 6-digit number.')
    buttons:
      - template: submit
        text: _("Enable")
        execute:
          type: url
          url: "/account/tfaemailotp"
      - template: cancel
        execute:
          type: url
          url: "/account/tfaemailotp"
