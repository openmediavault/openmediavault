version: "1.0"
type: component
data:
  name: omv-usermgmt-tfaemailotp-datatable-page
  type: datatablePage
  config:
    autoReload: false
    remoteSorting: true
    remotePaging: true
    stateId: 70d0d0de-81db-11f1-8255-5254001e0193
    sorters:
      - dir: asc
        prop: name
    store:
      proxy:
        service: TFAEmailOtp
        get:
          method: getItemList
    columns:
      - name: _("Name")
        prop: name
        flexGrow: 1
        sortable: true
      - name: _("Enabled")
        prop: enabled
        flexGrow: 1
        sortable: true
        cellTemplateName: checkIcon
    actions:
      - template: edit
        execute:
          type: url
          url: "/usermgmt/tfaemailotp/edit/{{ _selected[0].uuid }}"
      - template: delete
        execute:
          type: request
          request:
            service: TFAEmailOtp
            method: deleteItem
            params:
              uuid: "{{ uuid }}"
