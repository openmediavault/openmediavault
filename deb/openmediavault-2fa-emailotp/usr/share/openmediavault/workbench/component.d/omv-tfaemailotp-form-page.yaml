version: "1.0"
type: component
data:
  name: omv-tfaemailotp-form-page
  type: formPage
  config:
    id: tfaemailotp
    request:
      service: Session
      post:
        method: verify
        progressMessage: _('Verifying authentication code. Please wait...')
    fields:
      - type: hint
        text: _('A verification code has been sent to your email address. Please enter the code below.')
      - type: textInput
        name: username
        label: _("User name")
        icon: "user"
        disabled: true
        value: "{{ _routeParams.username }}"
      - type: textInput
        name: code
        label: _("Verification code")
        value: ""
        autofocus: true
        autocomplete: "one-time-code"
        validators:
          required: true
          minLength: 6
          maxLength: 6
          pattern:
            pattern: '^[0-9]{6}$'
            errorData: _('Must be a 6-digit number.')
    buttonAlign: center
    buttons:
      - template: submit
        text: _('Log in')
        execute:
          type: url
          url: "/dashboard"
      - template: cancel
        execute:
          type: url
          url: "/login"
