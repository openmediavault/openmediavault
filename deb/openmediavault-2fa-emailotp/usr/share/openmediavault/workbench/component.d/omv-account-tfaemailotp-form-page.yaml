version: "1.0"
type: component
data:
  name: omv-account-tfaemailotp-form-page
  type: formPage
  config:
    request:
      service: TFAEmailOtp
      get:
        method: getByContext
    fields:
      - type: hint
        hintType: info
        text: _("Two-factor authentication (2FA) with email OTP adds an extra layer of security by sending a one-time code to your email address in addition to your password. You can enable or disable it for your account here.")
      - type: hidden
        name: enabled
    buttons:
      - text: _("Enable")
        enabledConstraint:
          operator: falsy
          arg0:
            prop: enabled
        execute:
          type: url
          url: "/account/enable-tfaemailotp"
      - text: _("Disable")
        enabledConstraint:
          operator: truthy
          arg0:
            prop: enabled
        execute:
          type: url
          url: "/account/disable-tfaemailotp"
      - template: cancel
        execute:
          type: url
          url: "/account"
