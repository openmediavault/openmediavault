version: "1.0"
type: component
data:
  name: omv-usermgmt-tfaemailotp-form-page
  type: formPage
  config:
    request:
      service: TFAEmailOtp
      get:
        method: getItem
        params:
          uuid: "{{ _routeParams.uuid }}"
      post:
        method: setItem
    fields:
      - type: confObjUuid
      - type: textInput
        name: name
        label: _("Name")
        disabled: true
        validators:
          required: true
        value: ""
      - type: checkbox
        name: enabled
        label: _("Enabled")
        value: false
    buttons:
      - template: submit
        execute:
          type: url
          url: "/usermgmt/tfaemailotp"
      - template: cancel
        execute:
          type: url
          url: "/usermgmt/tfaemailotp"
