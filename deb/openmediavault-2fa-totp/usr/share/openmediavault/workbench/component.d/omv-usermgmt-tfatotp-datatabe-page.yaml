version: "1.0"
type: component
data:
  name: omv-usermgmt-tfatotp-datatable-page
  type: datatablePage
  config:
    autoReload: false
    remoteSorting: true
    remotePaging: true
    stateId: dbc8aabb-6f28-11f1-958c-525400f880f8
    sorters:
      - dir: asc
        prop: name
    store:
      proxy:
        service: TFATotp
        get:
          method: getItemList
    columns:
      - name: _("Name")
        prop: name
        flexGrow: 1
        sortable: true
      - name: _("Enabled")
        prop: enabled
        flexGrow: 1
        sortable: true
        cellTemplateName: checkIcon
    actions:
      - template: edit
        execute:
          type: url
          url: "/usermgmt/tfatotp/edit/{{ _selected[0].uuid }}"
      - template: delete
        execute:
          type: request
          request:
            service: TFATotp
            method: deleteItem
            params:
              uuid: "{{ uuid }}"
